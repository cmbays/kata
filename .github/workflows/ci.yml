name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    name: Lint, Tests, Quality Loop & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test:unit
      - run: npm run test:acceptance
      - run: npm run test:integration
      - run: npm run test:coverage:unit
      - run: npm run test:crap
      - run: npm run test:arch
      - run: npm run build
      - run: npm run test:e2e
